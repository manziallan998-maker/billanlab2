const Util = {
  uuid(){return crypto.randomUUID()},
  escapeHtml(str){if(str===null||str===undefined)return '';return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))},
  fmtDate(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt))return '—';return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})},
  fmtDateTime(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt))return '—';return dt.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})},
  timeAgo(d){if(!d)return '';const sec=Math.floor((Date.now()-new Date(d).getTime())/1000);if(sec<60)return 'just now';const min=Math.floor(sec/60);if(min<60)return min+'m ago';const hr=Math.floor(min/60);if(hr<24)return hr+'h ago';const day=Math.floor(hr/24);if(day<30)return day+'d ago';return Util.fmtDate(d)},
  fmtBytes(bytes){if(!bytes)return '0 B';const units=['B','KB','MB','GB'];let i=0,n=bytes;while(n>=1024&&i<units.length-1){n/=1024;i++}return n.toFixed(i===0?0:1)+' '+units[i]},
  initials(name){if(!name)return '?';const parts=name.trim().split(/\s+/);return ((parts[0]?.[0]||'')+(parts[1]?.[0]||'')).toUpperCase()||name[0].toUpperCase()},
  debounce(fn,ms){let t;return(...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms)}},
  userName(id){return State.profilesById[id]?.full_name||'Unknown'},
  qs(sel,root=document){return root.querySelector(sel)},
  qsa(sel,root=document){return Array.from(root.querySelectorAll(sel))},
  shortHash(){return Math.random().toString(36).substr(2,7)},
};

const UIModule = {
  toast(title,msg='',type='default'){
    const el=document.createElement('div');
    el.className='toast '+(type==='success'?'success':type==='error'?'error':'');
    el.innerHTML=`<div class="tt">${Util.escapeHtml(title)}</div>${msg?`<div>${Util.escapeHtml(msg)}</div>`:''}`;
    Util.qs('#toastContainer').appendChild(el);
    setTimeout(()=>{el.style.transition='opacity .25s';el.style.opacity='0';setTimeout(()=>el.remove(),250)},4200);
  },
  openModal({title,bodyHtml,footHtml,wide=false}){
    Util.qs('#modalTitle').textContent=title;
    Util.qs('#modalBody').innerHTML=bodyHtml;
    Util.qs('#modalFoot').innerHTML=footHtml||'';
    Util.qs('#modalBox').classList.toggle('wide',wide);
    Util.qs('#modalOverlay').classList.add('show');
  },
  closeModal(){
    Util.qs('#modalOverlay').classList.remove('show');
    Util.qs('#modalBody').innerHTML='';
    Util.qs('#modalFoot').innerHTML='';
  },
  confirm(message,onConfirm,opts={}){
    const danger=opts.danger!==false;
    UIModule.openModal({
      title:opts.title||'Are you sure?',
      bodyHtml:`<div class="confirm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg></div><div style="font-size:13.5px;color:var(--text-dim);">${Util.escapeHtml(message)}</div>`,
      footHtml:`<button class="btn btn-ghost" id="confirmCancelBtn">Cancel</button><button class="btn ${danger?'btn-danger':'btn-primary'}" id="confirmOkBtn">${opts.confirmLabel||'Confirm'}</button>`
    });
    Util.qs('#confirmCancelBtn').onclick=UIModule.closeModal;
    Util.qs('#confirmOkBtn').onclick=async()=>{Util.qs('#confirmOkBtn').disabled=true;await onConfirm();UIModule.closeModal()};
  },
  setBtnLoading(btn,loading,label){
    if(!btn)return;btn.disabled=loading;
    if(loading){btn.dataset.label=btn.innerHTML;btn.innerHTML=`<span class="spinner" style="width:13px;height:13px;border-width:2px;"></span> ${label||'Working…'}`}
    else if(btn.dataset.label){btn.innerHTML=btn.dataset.label}
  },
};

// =========================================================
// GITHUB OAUTH HANDLER - SINGLE DEFINITION
// =========================================================
async function handleOAuthCallback() {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    console.log('🔄 OAuth callback detected, processing...');
    try {
      const { data, error } = await supa.auth.getSession();
      if (error) throw error;
      if (data.session) {
        console.log('✅ Session found, logging in...');
        window.history.replaceState({}, document.title, window.location.pathname);
        UIModule.toast('✅ Successfully signed in with GitHub!', '', 'success');
        State.session = data.session;
        setTimeout(() => window.location.reload(), 1500);
        return true;
      }
    } catch (err) {
      console.error('❌ OAuth callback error:', err);
      UIModule.toast('GitHub sign-in failed', err.message, 'error');
      return false;
    }
  }
  return false;
}

async function signInWithGithub() {
  try {
    const { data, error } = await supa.auth.signInWithOAuth({
      provider: 'github',
      options: {
        redirectTo: window.location.origin + window.location.pathname,
      },
    });
    if (error) throw error;
  } catch (err) {
    UIModule.toast('GitHub login failed', err.message, 'error');
  }
}

// =========================================================
// AUTH MODULE - SINGLE DEFINITION
// =========================================================
const AuthModule = {
  async init(){
    // Check for OAuth callback first
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const handled = await handleOAuthCallback();
      if (handled) {
        Util.qs('#initialLoader').remove();
        return;
      }
    }
    
    // Normal login flow
    const { data } = await supa.auth.getSession();
    State.session = data.session;
    
    supa.auth.onAuthStateChange((event, session) => {
      State.session = session;
      if (event === 'SIGNED_OUT') AuthModule.showAuthScreen();
      if (event === 'SIGNED_IN') {
        UIModule.toast('Signed in successfully!', '', 'success');
        AuthModule.bootAfterLogin();
      }
    });
    
    if (State.session) {
      await AuthModule.bootAfterLogin();
    } else {
      AuthModule.showAuthScreen();
    }
    Util.qs('#initialLoader').remove();
  },
  
  showAuthScreen(){
    Util.qs('#app').classList.remove('ready');
    Util.qs('#authScreen').style.display = 'flex';
  },
  
  async bootAfterLogin(){
    try{
      await AuthModule.loadProfile();
      Util.qs('#authScreen').style.display = 'none';
      Util.qs('#app').classList.add('ready');
      AuthModule.resetInactivityTimer();
      ['mousemove','keydown','click','scroll','touchstart'].forEach(e => document.addEventListener(e, AuthModule.resetInactivityTimer, { passive: true }));
      await DataModule.loadAll();
      Router.navigate('dashboard');
      ActivityModule.log('login','session',null,`${State.profile.full_name} signed in`);
    } catch(err){
      console.error(err);
      UIModule.toast('Could not load workspace', err.message, 'error');
    }
  },
  
  async loadProfile(){
    const userId = State.session.user.id;
    let { data: profile, error } = await supa.from('profiles').select('*').eq('id', userId).maybeSingle();
    if (error) throw error;
    if (!profile) {
      const { count } = await supa.from('profiles').select('*', { count: 'exact', head: true });
      const role = (count === 0) ? 'admin' : 'member';
      const meta = State.session.user.user_metadata || {};
      const { data: created, error: insErr } = await supa.from('profiles').insert({
        id: userId,
        full_name: meta.full_name || State.session.user.email.split('@')[0],
        email: State.session.user.email,
        role,
      }).select().single();
      if (insErr) throw insErr;
      profile = created;
    }
    State.profile = profile;
    Util.qs('#userAvatar').textContent = Util.initials(profile.full_name);
    Util.qs('#userTriggerName').textContent = profile.full_name;
    Util.qs('#ddUserName').textContent = profile.full_name;
    Util.qs('#ddUserEmail').textContent = profile.email;
    Util.qs('#roleIndicator').textContent = profile.role;
    PermissionsModule.apply();
  },
  
  resetInactivityTimer(){
    clearTimeout(State.inactivityTimer);
    State.inactivityTimer = setTimeout(async () => {
      UIModule.toast('Session expired', 'Signed out after 30 min of inactivity.', 'error');
      await AuthModule.logout();
    }, INACTIVITY_LIMIT_MS);
  },
  
  async login(email, password){
    const { error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    const { data } = await supa.auth.getSession();
    State.session = data.session;
    await AuthModule.bootAfterLogin();
  },
  
  async signup(name, email, password){
    const { data, error } = await supa.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) throw error;
    if (data.session) {
      State.session = data.session;
      await AuthModule.bootAfterLogin();
    } else {
      UIModule.toast('Check your inbox', 'Confirm your email to continue.', 'success');
      AuthScreenModule.switchTab('login');
    }
  },
  
  async resetPassword(email){
    const { error } = await supa.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href,
    });
    if (error) throw error;
  },
  
  async logout(){
    if (State.profile) {
      try { await ActivityModule.log('logout', 'session', null, `${State.profile.full_name} signed out`); } catch (e) {}
    }
    await supa.auth.signOut();
    clearTimeout(State.inactivityTimer);
    State.session = null;
    State.profile = null;
    Util.qs('#app').classList.remove('ready');
    AuthModule.showAuthScreen();
  }
};

const DataModule = {
  async loadAll(){
    const results=await Promise.all([
      supa.from('profiles').select('*'),
      supa.from('projects').select('*').order('created_at',{ascending:false}),
      supa.from('project_members').select('*'),
      supa.from('tasks').select('*').order('created_at',{ascending:false}),
      supa.from('issues').select('*').order('created_at',{ascending:false}),
      supa.from('files').select('*').order('created_at',{ascending:false}),
      supa.from('activities').select('*').order('created_at',{ascending:false}).limit(200),
      supa.from('milestones').select('*').order('due_date',{ascending:true}),
      supa.from('check_ins').select('*').order('created_at',{ascending:false}).limit(100),
      supa.from('repositories').select('*').order('created_at',{ascending:false}),
      supa.from('commits').select('*').order('created_at',{ascending:false}).limit(500),
      supa.from('branches').select('*').order('created_at',{ascending:false}),
      supa.from('pull_requests').select('*').order('created_at',{ascending:false}),
      supa.from('releases').select('*').order('created_at',{ascending:false}),
      supa.from('repo_files').select('*').order('created_at',{ascending:false}),
    ]);
    results.forEach(r=>{if(r.error)console.warn('Load error:',r.error.message)});
    const [profiles,projects,members,tasks,issues,files,activities,milestones,checkIns,repos,commits,branches,prs,releases,repoFiles]=results;
    State.profilesById={};
    (profiles.data||[]).forEach(p=>State.profilesById[p.id]=p);
    State.projects=projects.data||[];
    State.projectMembers=members.data||[];
    State.tasks=tasks.data||[];
    State.issues=issues.data||[];
    State.files=files.data||[];
    State.activities=activities.data||[];
    State.milestones=milestones.data||[];
    State.checkIns=checkIns.data||[];
    State.repositories=repos.data||[];
    State.commits=commits.data||[];
    State.branches=branches.data||[];
    State.pullRequests=prs.data||[];
    State.releases=releases.data||[];
    State.repoFiles=repoFiles.data||[];
    NotifModule.refresh();
    Util.qs('#openIssuesBadge').textContent=State.issues.filter(i=>i.status==='open').length;
  },
  projectName(id){return State.projects.find(p=>p.id===id)?.name||'Unknown project'},
  repoName(id){return State.repositories.find(r=>r.id===id)?.name||'Unknown repo'},
};

const ActivityModule = {
  async log(action,entityType,entityId,description){
    try{
      const row={id:Util.uuid(),user_id:State.profile?.id||null,action,entity_type:entityType,entity_id:entityId,description,created_at:new Date().toISOString()};
      const{error}=await supa.from('activities').insert(row);
      if(error){console.warn('activity log failed',error.message);return}
      State.activities.unshift(row);
      if(State.currentView==='activity')ViewActivity.render();
      if(State.currentView==='dashboard')ViewDashboard.renderActivityList();
    }catch(e){console.warn(e)}
  }
};

// =========================================================
// NOTIFICATIONS
// =========================================================
const NotifModule = {
  refresh(){
    if(!State.profile)return;
    const mine=[];
    State.tasks.filter(t=>t.assigned_to===State.profile.id&&t.status!=='done').forEach(t=>mine.push({text:`Task assigned: ${t.title}`,time:t.created_at}));
    State.issues.filter(i=>i.assignee===State.profile.id&&i.status==='open').forEach(i=>mine.push({text:`Issue assigned: ${i.title}`,time:i.created_at}));
    State.pullRequests.filter(p=>p.reviewer_id===State.profile.id&&p.status==='open').forEach(p=>mine.push({text:`PR review needed: ${p.title}`,time:p.created_at}));
    const today=new Date().toISOString().slice(0,10);
    State.milestones.filter(m=>m.due_date===today&&m.status==='pending').forEach(m=>mine.push({text:`Milestone due today: ${m.title}`,time:m.due_date}));
    mine.sort((a,b)=>new Date(b.time)-new Date(a.time));
    State.notifications=mine.slice(0,10);
    Util.qs('#notifDot').style.display=State.notifications.length?'block':'none';
    const list=Util.qs('#notifList');
    if(!State.notifications.length){list.innerHTML=`<div class="search-empty">You're all caught up.</div>`}
    else{list.innerHTML=State.notifications.map(n=>`<div class="notif-item"><div class="nt">${Util.escapeHtml(n.text)}</div><div class="nm">${Util.timeAgo(n.time)}</div></div>`).join('')}
  }
};

// SEARCH MODULE
// =========================================================
const SearchModule = {
  init(){
    const input=Util.qs('#globalSearch');const resultsBox=Util.qs('#searchResults');
    input.addEventListener('input',Util.debounce(()=>SearchModule.run(input.value,resultsBox),150));
    input.addEventListener('focus',()=>{if(input.value)resultsBox.classList.add('show')});
    document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))resultsBox.classList.remove('show')});
  },
  run(query,box){
    query=query.trim().toLowerCase();if(!query){box.classList.remove('show');return}
    const results=[];
    State.projects.forEach(p=>{if(p.name.toLowerCase().includes(query))results.push({type:'project',label:p.name,sub:p.status,go:()=>Router.navigate('project-detail',{projectId:p.id})})});
    State.tasks.forEach(t=>{if(t.title.toLowerCase().includes(query))results.push({type:'task',label:t.title,sub:t.status,go:()=>Router.navigate('tasks')})});
    State.issues.forEach(i=>{if(i.title.toLowerCase().includes(query))results.push({type:'issue',label:i.title,sub:i.priority,go:()=>Router.navigate('issues')})});
    State.repositories.forEach(r=>{if(r.name.toLowerCase().includes(query))results.push({type:'repo',label:r.name,sub:r.description,go:()=>Router.navigate('repo-detail',{repoId:r.id})})});
    State.commits.forEach(c=>{if(c.message.toLowerCase().includes(query))results.push({type:'commit',label:c.message,sub:c.hash,go:()=>Router.navigate('repo-detail',{repoId:c.repo_id})})});
    State.files.forEach(f=>{if(f.file_name.toLowerCase().includes(query))results.push({type:'file',label:f.file_name,sub:f.category,go:()=>Router.navigate('archive')})});
    if(!results.length){box.innerHTML=`<div class="search-empty">No results for "${Util.escapeHtml(query)}"</div>`}
    else{
      box.innerHTML=results.slice(0,15).map((r,idx)=>`<div class="search-result-item" data-ridx="${idx}"><span class="search-result-type">${r.type}</span><div><div style="font-size:12.5px;font-weight:600;">${Util.escapeHtml(r.label)}</div><div style="font-size:10.5px;color:var(--text-faint);">${Util.escapeHtml(String(r.sub||''))}</div></div></div>`).join('');
      Util.qsa('.search-result-item',box).forEach((el,idx)=>el.onclick=()=>{results[idx].go();box.classList.remove('show');Util.qs('#globalSearch').value=''});
    }
    box.classList.add('show');
  }
};

// =========================================================
// SINGLE BOOT - ONLY ONE DOMContentLoaded LISTENER
// =========================================================
window.addEventListener('DOMContentLoaded', async () => {
  ThemeModule.init();
  AuthScreenModule.init();
  wireNav();
  SearchModule.init();
  
  // Check for OAuth callback
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    await handleOAuthCallback();
  } else {
    try {
      await AuthModule.init();
    } catch (err) {
      console.error('Initialization error:', err);
      Util.qs('#initialLoader').remove();
      AuthModule.showAuthScreen();
    }
  }
});
</script>
